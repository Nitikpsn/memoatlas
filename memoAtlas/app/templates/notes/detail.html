{% extends "base.html" %}
{% block content %}
<div class="content-wrapper animate-in">
  <div style="max-width:800px;">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:2rem;">
      <div>
        <h1 style="font-family:var(--font-retro);font-size:1.5rem;letter-spacing:-0.03em;margin-bottom:0.5rem;">{{ note.title }}</h1>
        <small style="color:var(--text-muted);font-size:0.75rem;">{{ note.date_posted.strftime('%B %d, %Y at %I:%M %p') }}</small>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <a href="{{ url_for('notes.edit_note', note_id=note.id) }}" class="btn-sm">EDIT</a>
        <form method="POST" action="{{ url_for('notes.delete_note', note_id=note.id) }}" onsubmit="return confirm('Delete this note?')">
          <button type="submit" class="btn-sm" style="color:#e74c3c;border-color:#e74c3c;">DELETE</button>
        </form>
      </div>
    </div>
    <div style="background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-lg);padding:2rem;">
      <div style="white-space:pre-wrap;line-height:1.8;color:var(--text-main);font-size:0.95rem;">{{ note.content }}</div>
    </div>
    <div style="margin-top:2rem;">
      <a href="{{ url_for('notes.index') }}" style="color:var(--text-muted);font-size:0.85rem;">&larr; BACK TO ALL NODES</a>
    </div>
  </div>
</div>
{% endblock %}
