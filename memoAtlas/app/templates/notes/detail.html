{% extends "base.html" %}
{% block content %}
<div class="content-wrapper animate-in">
  <div class="note-container">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:2rem;">
      <div>
        <h1 class="note-title-input" style="margin-bottom:0.25rem;cursor:default;">{{ note.title }}</h1>
        <small style="color:var(--text-muted);font-size:0.7rem;font-family:'JetBrains Mono',monospace;">{{ note.date_posted.strftime('%B %d, %Y at %I:%M %p') }}</small>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <a href="{{ url_for('notes.edit_note', note_id=note.id) }}" class="btn-sm">EDIT</a>
        <form method="POST" action="{{ url_for('notes.delete_note', note_id=note.id) }}" onsubmit="return confirm('Delete this note?')">
          <button type="submit" class="btn-sm" style="color:#e74c3c;border-color:#e74c3c;">DELETE</button>
        </form>
      </div>
    </div>
    {% if note.tags %}
    <div style="margin-bottom:1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
      {% for tag in note.tag_list() %}
      <span style="background:rgba(239,68,68,0.1);color:var(--retro-red, #EF4444);padding:2px 10px;border-radius:12px;font-size:0.75rem;font-family:var(--pixel-font, monospace);text-transform:uppercase;">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
    <div class="note-detail-body">{{ note.content }}</div>
    <div style="margin-top:2rem;">
      <a href="{{ url_for('notes.workspace') }}" style="color:var(--text-muted);font-size:0.85rem;font-family:'JetBrains Mono',monospace;">&larr; BACK TO ALL NODES</a>
    </div>
  </div>
</div>
{% endblock %}
