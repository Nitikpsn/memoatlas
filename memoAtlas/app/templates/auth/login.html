{% extends "base.html" %}

{% block title %}Login | MemoAtlas{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to access your knowledge graph.</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember" style="font-size: 0.85rem; color: var(--text-muted);">Remember me</label>
            </div>

            <button type="submit" class="btn-auth">Login to Atlas</button>
        </form>

        <div class="auth-footer">
            New here? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }
    .auth-card {
        background: var(--surface-dark);
        border: 1px solid var(--border-gray);
        padding: 3rem;
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 400px;
    }
    .auth-card h2 {
        font-family: var(--font-retro);
        font-size: 1.25rem;
        letter-spacing: -0.03em;
        margin-bottom: 0.5rem;
        text-align: center;
    }
    .auth-subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.85rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input {
        width: 100%;
        padding: 14px;
        background: var(--bg-black);
        border: 1px solid var(--border-gray);
        border-radius: var(--radius-sm);
        color: var(--text-white);
        font-size: 1rem;
        outline: none;
        font-family: var(--font-modern);
    }
    .form-input:focus { border-color: var(--text-muted); }
    .btn-auth {
        width: 100%;
        padding: 14px;
        background: var(--text-white);
        color: var(--bg-black);
        border: none;
        border-radius: var(--radius-sm);
        font-weight: 600;
        cursor: pointer;
        transition: opacity var(--transition-fast);
        font-family: var(--font-modern);
        font-size: 0.85rem;
    }
    .btn-auth:hover { opacity: 0.85; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--text-white); text-decoration: none; font-weight: 600; }
</style>
{% endblock %}
