{% extends "base.html" %}
{% block title %}Login | MemoAtlas{% endblock %}
{% block content %}
<div class="forest-auth animate-in">
  <div class="forest-auth-card">
    <svg style="width:32px;height:32px;margin:0 auto 1rem;display:block;" viewBox="0 0 32 32">
      <polygon points="16,4 4,28 28,28" fill="none" stroke="#FFF" stroke-width="1.5"/>
      <line x1="16" y1="14" x2="16" y2="22" stroke="#888" stroke-width="1.5"/>
      <line x1="10" y1="22" x2="22" y2="22" stroke="#888" stroke-width="1.5"/>
    </svg>
    <h2>Welcome Back</h2>
    <p class="forest-auth-subtitle">Log in to tend your forest.</p>

    <form method="POST">
      <div class="forest-form-group">
        <label class="forest-label">Email</label>
        <input type="email" name="email" class="forest-input" placeholder="name@email.com" required>
      </div>

      <div class="forest-form-group">
        <label class="forest-label">Password</label>
        <input type="password" name="password" class="forest-input" placeholder="••••••••" required>
      </div>

      <div class="forest-checkbox">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="forest-btn">LOGIN TO FOREST</button>
    </form>

    <div class="forest-auth-footer">
      New here? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
