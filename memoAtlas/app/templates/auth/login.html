{% extends "base.html" %}

{% block title %}Login | MemoAtlas{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to access your knowledge graph.</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember" style="font-size: 0.85rem; color: var(--text-muted);">Remember me</label>
            </div>

            <button type="submit" class="btn-auth">Login to Atlas</button>
        </form>

        <div class="auth-footer">
            New here? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }
    .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 3rem;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
    }
    h2 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center; }
    .auth-subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.95rem; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .form-input {
        width: 100%;
        padding: 14px;
        background: #000;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: white;
        font-size: 1rem;
    }
    .form-input:focus { outline: none; border-color: #555; }
    
    .btn-auth {
        width: 100%;
        padding: 14px;
        background: white;
        color: black;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .btn-auth:hover { opacity: 0.9; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: white; text-decoration: none; font-weight: 600; }
</style>
{% endblock %}
