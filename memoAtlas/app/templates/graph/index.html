{% extends "base.html" %}

{% block title %}Knowledge Graph | MemoAtlas{% endblock %}

{% block content %}
<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
  <div>
    <h2>Your Knowledge Atlas</h2>
    <p>Explore the living constellation of your thoughts.</p>
  </div>
  <button id="pulse-btn" class="pulse-btn">
    <span class="pulse-indicator"></span>
    Pulse
  </button>
</div>

<div id="mynetwork" style="width: calc(100% - 2rem); height: 65vh; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; margin: 0 1rem;"></div>

<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/graph.js') }}"></script>
{% endblock %}
