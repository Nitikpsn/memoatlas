{% extends "base.html" %}
{% block content %}
<div style="max-width: 800px; margin: 2rem auto; padding: 0 1rem;">
    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
        <div>
            <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">{{ note.title }}</h1>
            <small style="color: var(--text-muted);">{{ note.date_posted.strftime('%B %d, %Y at %I:%M %p') }}</small>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <a href="{{ url_for('notes.edit_note', note_id=note.id) }}" class="btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">Edit</a>
            <form method="POST" action="{{ url_for('notes.delete_note', note_id=note.id) }}" onsubmit="return confirm('Delete this note?')">
                <button type="submit" class="btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; color: #e74c3c; border-color: #e74c3c;">Delete</button>
            </form>
        </div>
    </div>
    <div class="feature-card" style="padding: 2rem;">
        <div style="white-space: pre-wrap; line-height: 1.8; color: var(--text-main);">{{ note.content }}</div>
    </div>
    <div style="margin-top: 2rem;">
        <a href="{{ url_for('notes.index') }}" style="color: var(--text-muted); text-decoration: none;">&larr; Back to all notes</a>
    </div>
</div>
{% endblock %}
