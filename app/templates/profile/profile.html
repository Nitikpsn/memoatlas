{% extends "base.html" %}

{% block title %}Profile - MemoAtlas{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
    <h1 style="margin-bottom: 1.5rem;">Profile</h1>

    <div style="background: #121212; padding: 1.5rem; border-radius: 12px; border: 1px solid #262626;">
        <p style="margin-bottom: 0.5rem;"><strong>Username:</strong> {{ current_user.username }}</p>
        <p style="margin-bottom: 0.5rem;"><strong>Email:</strong> {{ current_user.email }}</p>
        <p style="color: #a3a3a3; font-size: 0.85rem;">Member since {{ current_user.created_at.strftime('%B %d, %Y') }}</p>
    </div>

    <div style="margin-top: 2rem;">
        <a href="{{ url_for('dashboard.index') }}" style="color: #a3a3a3;">&larr; Back to Dashboard</a>
    </div>
</div>
{% endblock %}
