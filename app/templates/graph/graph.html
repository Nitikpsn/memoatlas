{% extends "base.html" %}

{% block title %}Knowledge Graph - MemoAtlas{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/graph.css') }}">

<div style="max-width: 1200px; margin: 0 auto; padding: 2rem 5%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>Knowledge Graph</h1>
        <a href="{{ url_for('notes.create') }}" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">+ New Note</a>
    </div>

    <div id="graph-container" style="background: #121212; border-radius: 12px; border: 1px solid #262626; height: 600px; position: relative;">
        <canvas id="graphCanvas"></canvas>
    </div>

    <div id="graph-info" style="margin-top: 1rem; padding: 1rem; background: #121212; border-radius: 8px; border: 1px solid #262626; display: none;">
        <p id="selected-note"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<script>
    const graphData = {{ graph_data | tojson }};

    const nodes = new vis.DataSet(
        graphData.nodes.map(n => ({
            id: n.id,
            label: n.label,
            group: n.subject,
        }))
    );

    const edges = new vis.DataSet(
        graphData.edges.map(e => ({
            from: e.source,
            to: e.target,
            label: e.label,
            smooth: { type: 'curvedCW', roundness: 0.2 },
        }))
    );

    const container = document.getElementById('graphCanvas');
    const data = { nodes, edges };
    const options = {
        physics: {
            enabled: true,
            stabilization: { iterations: 100 },
        },
        interaction: { hover: true },
        nodes: {
            shape: 'dot',
            size: 16,
            font: { color: '#f5f5f5', size: 14 },
            borderWidth: 2,
        },
        edges: {
            color: { color: '#50545a', highlight: '#646c7e' },
            font: { color: '#a3a3a3', size: 10 },
        },
    };

    const network = new vis.Network(container, data, options);

    network.on('click', function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const node = graphData.nodes.find(n => n.id === nodeId);
            document.getElementById('graph-info').style.display = 'block';
            document.getElementById('selected-note').innerHTML =
                `<strong>${node.label}</strong> - Subject: ${node.subject} <a href="/notes/${nodeId}" style="color: #50545a; margin-left: 1rem;">View</a>`;
        }
    });
</script>
{% endblock %}
