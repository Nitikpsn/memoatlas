{% extends "base.html" %}

{% block title %}Knowledge Graph | MemoAtlas{% endblock %}

{% block content %}
<div class="graph-header">
    <h2>Your Knowledge Graph</h2>
    <p>Visualizing the connections between your thoughts.</p>
</div>

<div id="mynetwork" style="width: 100%; height: 600px; background-color: #050505; border: 1px solid #262626; border-radius: 20px;"></div>

<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script type="text/javascript">
    fetch('/api/graph-data')
        .then(response => response.json())
        .then(data => {
            const nodes = new vis.DataSet(data.nodes.map(n => ({ id: n.id, label: n.title })));
            const edges = new vis.DataSet(data.links);

            const container = document.getElementById('mynetwork');
            const graphData = { nodes: nodes, edges: edges };
            const options = {
                nodes: {
                    shape: 'dot',
                    size: 16,
                    color: { background: '#ffffff', border: '#ffffff' },
                    font: { color: '#a3a3a3', size: 12 }
                },
                edges: { color: '#262626' },
                physics: { enabled: true, barnesHut: { gravitationalConstant: -2000 } }
            };
            new vis.Network(container, graphData, options);
        });
</script>
{% endblock %}
