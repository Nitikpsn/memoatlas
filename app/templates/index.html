{% extends "base.html" %}

{% block content %}
<div class="hero-section">
    <h1 class="hero-title">Your notes, <br><span class="gradient-text">connected.</span></h1>
    
    <p class="hero-subtitle">
        MemoAtlas is a second brain for students, turning isolated notes into 
        interactive knowledge graphs that reveal how concepts connect across subjects.
    </p>

    <div class="hero-btns">
        <a href="{{ url_for('auth.register') }}" class="btn-primary">Start Mapping</a>
        <a href="#how-it-works" class="btn-secondary">How it works</a>
    </div>
</div>

<style>
    .hero-section {
        text-align: center;
        padding: 100px 20px;
        max-width: 900px;
        margin: 0 auto;
        animation: fadeInUp 0.8s ease-out;
    }

    .hero-title {
        font-size: 4.5rem;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -2px;
        margin-bottom: 1.5rem;
    }

    .gradient-text {
        color: var(--text-muted);
    }

    .hero-subtitle {
        font-size: 1.25rem;
        color: var(--text-muted);
        max-width: 600px;
        margin: 0 auto 3rem auto;
        line-height: 1.6;
    }

    .hero-btns {
        display: flex;
        gap: 1rem;
        justify-content: center;
    }

    .btn-primary {
        background: var(--text-main);
        color: var(--bg-color);
        padding: 14px 28px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.2s;
    }

    .btn-secondary {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 14px 28px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
    }

    .btn-primary:hover { transform: scale(1.05); }
    .btn-secondary:hover { background: #1a1a1a; }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
