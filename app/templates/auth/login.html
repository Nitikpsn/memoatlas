{% extends "base.html" %}

{% block title %}Login | MemoAtlas{% endblock %}

{% block content %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        animation: fadeIn 0.6s ease-out;
    }

    .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 3rem;
        border-radius: 24px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .auth-card h2 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        letter-spacing: -1px;
    }

    .auth-card p {
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .auth-card p a {
        color: var(--text-main);
        text-decoration: none;
        font-weight: 600;
    }

    .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .form-group input {
        width: 100%;
        padding: 0.8rem 1rem;
        background: #1a1a1a;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: var(--text-main);
        font-size: 1rem;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--accent);
    }

    .btn-auth {
        width: 100%;
        background: var(--text-main);
        color: var(--bg-color);
        padding: 0.8rem;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
        margin-top: 1rem;
    }

    .btn-auth:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .divider {
        margin: 2rem 0;
        display: flex;
        align-items: center;
        color: var(--text-muted);
        font-size: 0.8rem;
    }

    .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-color);
        margin: 0 1rem;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h2>Yooo, welcome back!</h2>
        <p>First time here? <a href="{{ url_for('auth.register') }}">Sign up for free</a></p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-auth">Sign in</button>
        </form>

        <div class="divider">or</div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="#" class="btn" style="background: transparent; border: 1px solid var(--border-color); padding: 0.6rem; font-size: 0.9rem; border-radius: 10px; color: var(--text-main); text-decoration: none;">
                Sign in using magic link
            </a>
            <a href="#" class="btn" style="background: transparent; border: 1px solid var(--border-color); padding: 0.6rem; font-size: 0.9rem; border-radius: 10px; color: var(--text-main); text-decoration: none;">
                Single sign-on (SSO)
            </a>
        </div>
    </div>
</div>
{% endblock %}
